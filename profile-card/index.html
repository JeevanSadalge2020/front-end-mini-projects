<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GreatFrontEnd Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
    />
    <link rel="icon" href="img/favicon.ico" sizes="any" />
  </head>
  <body>
    <div class="card">
      <!-- Section 1: Profile image -->
      <img class="card__avatar" src="./img/profile.png" alt="Sarah Dole" />

      <!-- Section 2: Name + job title -->
      <div class="card__identity">
        <h3>Sarah Dole</h3>
        <p>Front End Engineer @ Microsoft</p>
      </div>

      <!-- Section 3: Bio -->
      <p class="card__bio">
        I turn coffee into bugs which are fixed by someone else. Certified Stack
        Overflow and ChatGPT developer.
      </p>

      <!-- Section 4: Contact button -->
      <button type="button">Contact me</button>

      <!-- Section 5: Social icons -->
      <div class="card__socials">
        <a href="#" aria-label="GitHub"><i class="ri-github-fill"></i></a>
        <a href="#" aria-label="LinkedIn"
          ><i class="ri-linkedin-box-fill"></i
        ></a>
        <a href="#" aria-label="Instagram"><i class="ri-instagram-fill"></i></a>
        <a href="#" aria-label="X"><i class="ri-twitter-x-fill"></i></a>
      </div>
    </div>

    <!-- Attribute this challenge to yourself! -->
    <div class="credits" data-gfe-screenshot-exclude="true">
      A challenge by
      <a
        href="https://www.greatfrontend.com/projects?ref=challenges"
        target="_blank"
        >GreatFrontEnd Projects</a
      >. Built by
      <a
        href="https://www.greatfrontend.com/projects/u/username"
        target="_blank"
        >Jeevan</a
      >.
    </div>
    <script src="js/index.js"></script>
  </body>
</html>
